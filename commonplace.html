<head>
	<title>Commonplace</title>
</head>

<body>
<div id="heading"></div>
<textarea id="note"></textarea>
<button id="button">Append?</button>

<div id="feed"></div>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<script>
const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTmPJA2q3VJok32VvJbEjEN_VoymKj8wZGj8cdRI3Ws5VC_gH5xVFNy39vPfGcFm6FLqrbLSdpQZYI1/pub?output=csv";
const WRITE_URL = "https://script.google.com/macros/s/AKfycbzPXZTq7HYZ8lF20tObKuD9GbXBHA_DOGnPACHSi63k2_9R1HwqRoJ9IFW45OOx_Qbbgg/exec";
const SECRET = "Vega";

function renderEntry(text, date) {
	const p = document.createElement("p");
	
	let displayText;
	if (date) {
		displayText = date + " - " + text;
	} else { 
		displayText = text;
	}
	p.textContent = displayText;
	
	document.getElementById("feed").prepend(p);
}

async function loadEntries() {
	const res = await fetch(SHEET_CSV_URL + "&_=" + Date.now(), { cache: "no-store" });
	const csvText = await res.text();
	const { data } = Papa.parse(csvText, { header: true, skipEmptyLines: true });
	document.getElementById("feed").innerHTML = "";
	data.forEach(row => renderEntry(row.text || "", row.date || ""));
}

document.getElementById("button").addEventListener("click", async function () {
	const text = document.getElementById("note").value.trim();
	if (!text) return;

	await fetch(WRITE_URL, {
		method: "POST",
		body: new URLSearchParams({ text, secret: SECRET })
	});

	renderEntry(text);
	document.getElementById("note").value = "";
});

loadEntries();
</script>

</body>
